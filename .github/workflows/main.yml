name: Build 3DS Game

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build project
        run: |
          # On essaie de compiler directement, 
          # devkitarm:latest a souvent déjà le minimum vital
          make
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrafficRacer-3DS
          path: |
            *.3dsx
