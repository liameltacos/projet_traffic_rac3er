name: Build 3DS Game

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build project
        run: |
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: TrafficRacer-3DS
          path: |
            *.3dsx
            *.cia
