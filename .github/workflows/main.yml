name: Build 3DS Game
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    # On utilise une version où tout est DÉJÀ dedans
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build project
        run: |
          # On ne télécharge rien, on essaie de compiler direct
          make
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrafficRacer-3DS
          path: "*.3dsx"
