name: Build 3DS Game

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install 3DS Libraries
        run: |
          # On utilise les noms de paquets ultra-simplifiés
          dkp-pacman -Syu --noconfirm citro2d citro3d libctru 3ds-dev

      - name: Build project
        run: |
          make
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrafficRacer-3DS
          path: |
            *.3dsx
